<!DOCTYPE html>
<html>

<head>
    <title>Contact HariyaliMitra</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="calculator-box">

    <h1>📞 Contact HariyaliMitra</h1>

    <p>
Need help with farming tools or crop information?
Send us a message.
</p>

    <p>Feel free to contact us for farming support.</p>

    <a href="index.html">
        <button>🏠 Back to Home</button>
    </a>

    <br><br>

    <input type="text"
    id="name"
    placeholder="Enter Your Name">

    <br><br>

    <input type="email"
    id="email"
    placeholder="Enter Your Email">

    <br><br>

    <textarea
    id="message"
    placeholder="Enter Your Message"
    rows="5"
    cols="40"></textarea>

    <br><br>

    <button onclick="sendMessage()">
        Send Message
    </button>

    <br><br>

    <p id="contactResult">
        Your response will appear here
    </p>

</div>

<script src="script.js"></script>

</body>

</html>
