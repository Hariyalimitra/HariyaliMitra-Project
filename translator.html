<!DOCTYPE html>
<html>

<head>
    <title>Hindi to English Converter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🌐 Hindi to English Converter</h1>

    <textarea id="hindiText"
    placeholder="Hindi text likho..."
    rows="6"
    cols="50"></textarea>

    <br><br>

    <button onclick="convertText()">
        Convert
    </button>

    <br><br>

    <div class="info-box">

        <h3>English Output</h3>

        <p id="outputText">
            Translation will appear here...
        </p>

    </div>

<script src="script.js"></script>

</body>
